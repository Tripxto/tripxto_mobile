<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trips - TripXto</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="trips.js"></script>

<style>
.hero-slider {
  display: flex;
  transition: transform 0.7s ease-in-out;

}

/* ===== Wrapper ===== */
.trip-switch-wrapper {
  margin: 50px auto 0;
  display: flex;
  justify-content: center;
  width: 100%;
}

/* ===== Container ===== */
.trip-switch {
  display: inline-flex;
  padding: 4px;
  background: rgb(255, 255, 255);
  backdrop-filter: blur(10px);
  border-radius: 12px;
  border: 2px solid rgba(207, 201, 201, 0.24);
  box-shadow: 0 2px 10px rgb(255, 255, 255);
  flex-wrap: wrap;
  gap: 4px;
}

@media (min-width: 640px) {
  .trip-switch {
    padding: 6px;
    border-radius: 16px;
    gap: 6px;
  }
}

/* ===== Buttons ===== */
.trip-tab {
  padding: 12px 20px;
  font-size: 13px;
  font-weight: 500;
  color: #335dd8;
  border: none;
  background: transparent;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.45s ease;
  white-space: nowrap;
}

@media (min-width: 640px) {
  .trip-tab {
    padding: 20px 30px;
    font-size: 16px;
    border-radius: 14px;
  }
}

/* Hover (only when not active) */
.trip-tab:hover:not(.active) {
  color: #047857;
  background: rgba(255, 255, 255, 0.6);
}

/* Active */
.trip-tab.active {
  background: #6152e7;
  color: #ffffff;
  font-weight: 600;
  box-shadow: 0 6px 14px rgba(5, 150, 105, 0.25);
}





</style>

</head>

<body class="font-['Inter'] bg-white">

<!-- ================= NAVBAR ================= -->
<nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 sm:py-4 flex items-center justify-between">

    <!-- Logo -->
    <div class="flex items-center gap-2 sm:gap-3">
      <a href="index.html"><span
        class="text-lg sm:text-xl lg:text-2xl font-extrabold tracking-tight
               bg-gradient-to-r from-blue-600 to-cyan-500
               bg-clip-text text-transparent">
        TripXto
      </span></a>
    </div>

    <!-- Right Section -->
    <div class="flex items-center gap-4 sm:gap-6 lg:gap-8">

      <!-- Nav Links -->
      <a href="create_trip.html"
         class="text-xs sm:text-sm font-medium text-gray-600 hover:text-blue-600 transition">
        Create Trip
      </a>

      <span class="text-xs sm:text-sm font-semibold text-blue-600 border-b-2 border-blue-600 pb-1">
        Trips
      </span>

      <!-- Icons -->
      <div class="flex items-center gap-3 sm:gap-6 text-gray-500">

        <!-- Notification Icon -->
        <button class="hover:text-gray-900 transition">
          <svg class="w-4 sm:w-5 h-4 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                  d="M15 17h5l-1.405-1.405C18.21 15.21 18 14.71 18 14V11a6 6 0 10-12 0v3c0 .71-.21 1.21-.595 1.595L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
        </button>

        <!-- Profile Icon -->
        <button class="w-7 sm:w-9 h-7 sm:h-9 flex items-center justify-center rounded-full border border-gray-200 hover:bg-gray-100 transition">
          <svg class="w-3 sm:w-4 h-3 sm:h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <circle cx="12" cy="8" r="4" stroke-width="1.8"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                  d="M4 20c1.8-4 6-6 8-6s6.2 2 8 6"/>
          </svg>
        </button>

      </div>

    </div>

  </div>
</nav>


<section class="mt-8 sm:mt-10">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
  <div class="relative overflow-hidden rounded-2xl sm:rounded-3xl shadow-lg bg-white">

    <!-- Slider Container -->
    <div id="promoSlider"
         class="flex transition-transform duration-700 ease-in-out">
    </div>

    <!-- Dots -->
    <div id="promoDots"
         class="absolute bottom-3 sm:bottom-4 left-1/2 -translate-x-1/2 flex gap-2">
    </div>
    </div>

  </div>
</section>



<!-- ================= MAIN ================= -->
<section class="mt-12 sm:mt-16 lg:mt-20">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <!-- Header -->
    <div class="py-8 sm:py-12 px-4 sm:px-6 max-w-7xl mx-auto text-center border-b border-gray-100">
      <h1 class="text-3xl sm:text-4xl lg:text-6xl font-black tracking-tighter text-slate-900">
        Your Global Journey, <span class="text-blue-600">Perfectly Cataloged.</span>
      </h1>

      <p class="mt-4 sm:mt-6 text-base sm:text-lg lg:text-xl text-slate-500 font-light tracking-wide">
        Organize your past escapes and upcoming horizons with <span class="text-slate-900 font-medium">uncompromising clarity and professional detail.</span>
      </p>

      <!-- Switch -->
      <div class="trip-switch-wrapper">
        <div class="trip-switch">
          <button class="trip-tab active" data-tab="Ongoing">
            Ongoing
          </button>

          <button class="trip-tab" data-tab="Upcoming">
            Upcoming
          </button>

          <button class="trip-tab" data-tab="Past">
            Past
          </button>
        </div>
      </div>
    </div>

    <!-- Trip Cards Grid -->
    <div id="tripContainer" class="mt-8 sm:mt-10 lg:mt-12 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-8 lg:gap-10">
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="hidden relative overflow-hidden rounded-xl sm:rounded-2xl lg:rounded-[2rem] border border-gray-100 bg-white p-8 sm:p-12 text-center shadow-xl shadow-gray-200/50 mt-8 sm:mt-12">
      <div class="absolute -top-24 -right-24 h-48 w-48 rounded-full bg-emerald-50 blur-3xl opacity-50"></div>
      
      <div class="relative z-10">
        <div class="mx-auto mb-6 flex h-16 sm:h-20 w-16 sm:w-20 items-center justify-center rounded-2xl bg-emerald-50 text-emerald-600">
          <svg class="h-8 sm:h-10 w-8 sm:w-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
        </div>
        
        <h3 class="text-xl sm:text-2xl font-bold text-gray-900">The world is waiting.</h3>
        <p class="mx-auto mt-2 max-w-sm text-sm sm:text-base text-gray-500 font-light">
          You haven't added any trips to this category yet. Start mapping your next adventure today.
        </p>
      </div>
    </div>
  </div>
</section>



<!-- ================= SCRIPT ================= -->

</body>
</html>
