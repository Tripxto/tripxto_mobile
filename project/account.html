<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account - TripXTO</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f6f8;
}

/* Navbar */
.navbar {
  padding: 16px 40px;
  background: #fff;
  border-bottom: 1px solid #e5e5e5;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #2d5bd1;
}

/* Container */
.container {
  width: 440px;
  margin: 60px auto;
  background: #fff;
  border-radius: 20px;
  padding: 30px 28px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  position: relative;
}

/* Close */
.close {
  position: absolute;
  right: 18px;
  top: 18px;
  font-size: 18px;
  cursor: pointer;
}

/* Title */
h2 {
  text-align: center;
  color: #2d5bd1;
  margin-bottom: 10px;
}

.divider {
  height: 2px;
  background: #2d5bd1;
  margin-bottom: 24px;
}

/* Form spacing */
.form-group {
  margin-bottom: 16px;
}

/* Inputs */
input {
  width: 100%;
  height: 44px;
  padding: 0 12px;
  border-radius: 10px;
  border: 1px solid #dcdcdc;
  font-size: 14px;
  outline: none;
  box-sizing: border-box;
}

input:focus {
  border-color: #2d5bd1;
}

/* Row */
.row {
  display: flex;
  gap: 10px;
}

/* Phone */
.phone-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.country-box {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 10px;
  height: 44px;
  border: 1px solid #dcdcdc;
  border-radius: 10px;
  background: #fafafa;
  font-size: 14px;
}

.flag {
  font-size: 16px;
}

/* Button */
button {
  width: 100%;
  height: 46px;
  margin-top: 8px;
  background: #2d5bd1;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  cursor: pointer;
}

button:hover {
  opacity: 0.95;
}

/* Helper */
.helper {
  font-size: 12px;
  color: #888;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="logo">TripXTO</div>
</div>

<div class="container">

  <div class="close" onclick="history.back()">✕</div>

  <h2>Create Account</h2>
  <div class="divider"></div>

  <!-- Phone -->
  <div class="form-group phone-row">
    <div class="country-box">
      <span class="flag">🇮🇳</span>
      <span>+91</span>
    </div>
    <input type="text" id="phone" placeholder="Enter phone number" maxlength="10">
  </div>

  <!-- Name -->
  <div class="form-group row">
    <input type="text" id="firstName" placeholder="First Name">
    <input type="text" id="lastName" placeholder="Last Name">
  </div>

  <!-- Email -->
  <div class="form-group">
    <input type="email" id="email" placeholder="Enter your Email">
  </div>

  <!-- Pincode -->
  <div class="form-group">
    <input type="text" id="pincode" placeholder="Enter Pincode" maxlength="6">
    
  </div>

  <!-- City -->
  <div class="form-group">
    <input type="text" id="city" placeholder="City" readonly>
  </div>

  <!-- State -->
  <div class="form-group">
    <input type="text" id="state" placeholder="State" readonly>
  </div>

  <button onclick="createAccount()">Save</button>

</div>

<script>

// Debounce
let timer;
document.getElementById("pincode").addEventListener("input", function () {
  const pin = this.value;

  if (pin.length !== 6) return;

  clearTimeout(timer);
  timer = setTimeout(() => fetchLocation(pin), 400);
});

// Fetch location
async function fetchLocation(pin) {
  try {
    const res = await fetch(`https://api.postalpincode.in/pincode/${pin}`);
    const data = await res.json();

    if (data[0].Status === "Success") {
      const post = data[0].PostOffice[0];

      document.getElementById("city").value = post.District;
      document.getElementById("state").value = post.State;

    } else {
      clearFields();
      alert("Invalid pincode");
    }

  } catch {
    clearFields();
    alert("Network error");
  }
}

// Clear
function clearFields() {
  document.getElementById("city").value = "";
  document.getElementById("state").value = "";
}

// Submit
function createAccount() {
  const data = {
    phone: "+91" + document.getElementById("phone").value,
    firstName: document.getElementById("firstName").value,
    lastName: document.getElementById("lastName").value,
    email: document.getElementById("email").value,
    pincode: document.getElementById("pincode").value,
    city: document.getElementById("city").value,
    state: document.getElementById("state").value,
    country: "India"
  };

  if (data.phone.length !== 13) {
    alert("Invalid phone number");
    return;
  }

  if (!data.firstName || !data.email) {
    alert("Fill required fields");
    return;
  }

  console.log(data);
  alert("Account Created Successfully");
}
</script>

</body>
</html>
