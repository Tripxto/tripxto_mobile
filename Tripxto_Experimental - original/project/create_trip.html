<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Trip</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="styles.css" />
</head>
<script src="script.js"></script>

<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">

  <!-- Card Container -->
  <div class="bg-white shadow-2xl rounded-2xl w-full max-w-2xl p-8 relative">

    <!-- Close Button -->
    <a href="index.html" 
       class="absolute top-4 right-4 text-gray-400 hover:text-red-500 text-xl font-bold">
       ✕
    </a>

    <!-- Title -->
    <h1 class="text-3xl font-bold text-center text-blue-600 mb-8">
      Create Your Perfect Trip
    </h1>

    <!-- Form -->
    <form id="tripForm" class="space-y-6">

      <!-- Destination -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Where are you traveling to?
        </label>
        <input 
          type="text"
          id="destination"
          placeholder="Places like Bengaluru, Mumbai etc"
          class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
          required
        />
      </div>

      <!-- Dates -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          How many days is your trip?
        </label>

        <div>
  

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

    <!-- Start Date -->
    <div class="flex flex-col">
      <label for="startDate" class="text-xs text-gray-500 mb-1">
        Start Date
      </label>
      <input 
        type="date"
        id="startDate"
        class="px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none"
        required
      />
    </div>

    <!-- End Date -->
    <div class="flex flex-col">
      <label for="endDate" class="text-xs text-gray-500 mb-1">
        End Date
      </label>
      <input 
        type="date"
        id="endDate"
        class="px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none"
        required
      />
    </div>

  </div>
</div>

      </div>

      <!-- About -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          About This Trip
        </label>
        <textarea 
          id="aboutTrip"
          rows="3"
          placeholder="Tell us more about your travel plan..."
          class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none resize-none"
        ></textarea>
      </div>

      <!-- Submit -->
      <button 
        type="submit"
        class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition transform hover:scale-[1.02] active:scale-95"
      >
        Create Trip
      </button>

      <!-- Message -->
      <p id="message" class="text-center text-sm font-medium mt-2 hidden"></p>

    </form>

  </div>

  
</body>
</html>
