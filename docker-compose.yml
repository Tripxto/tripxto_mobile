services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - tripxto_mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - tripxto_redis_data:/data

volumes:
  tripxto_mongo_data:
  tripxto_redis_data:
